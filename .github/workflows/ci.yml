name: CI

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.13"]

    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
      - run: uv sync --extra dev
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run mypy
      - run: uv run pytest --cov
      - run: uv run codedebrief validate . --check-sync --quality --max-skipped-files 0 --max-parse-warnings 0 --min-call-resolution 0.90 --max-generic-label-ratio 0.05
      - run: uv run codedebrief view . --render-only --no-open
      - if: matrix.python-version == '3.13'
        run: |
          uv build --out-dir /tmp/codedebrief-dist
          UV_TOOL_DIR=/tmp/codedebrief-uv-tools uvx twine check /tmp/codedebrief-dist/*
          uv venv /tmp/codedebrief-wheel-smoke
          uv pip install --python /tmp/codedebrief-wheel-smoke/bin/python /tmp/codedebrief-dist/*.whl
          /tmp/codedebrief-wheel-smoke/bin/codedebrief --version
          /tmp/codedebrief-wheel-smoke/bin/codedebrief doctor --json

  viewer:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      - run: npm run viewer:typecheck
      - run: npm run viewer:test
      - run: npm run viewer:build
      - run: npm audit --audit-level=high
